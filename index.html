
<style>
.wm-wrap { padding: 1rem 0; display: flex; flex-direction: column; align-items: flex-start; gap: 16px; }
.wm-card { width: 400px; height: 400px; border-radius: 16px; overflow: hidden; position: relative; background: #000; cursor: pointer; }
.wm-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.demo-hint { font-size: 12px; color: var(--color-text-secondary); }
</style>

<div class="wm-wrap">
  <div class="wm-card" id="card">
    <canvas class="wm-canvas" id="c"></canvas>
  </div>
  <span class="demo-hint">Cliquez pour rejouer</span>
</div>

<script>
const card = document.getElementById('card');
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

const DPR = Math.min(window.devicePixelRatio || 1, 3);
let W, H;

function resize() {
  const r = card.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
}

if (!gl) {
  canvas.style.display = 'none';
  card.style.background = '#111';
} else {

const vert = `#version 300 es
precision highp float;
in vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0, 1); }`;

const frag = `#version 300 es
precision highp float;
uniform vec2 u_res;
uniform float u_t;
out vec4 fragColor;

#define PI 3.141592653589793

float hash(vec2 p) {
  p = fract(p * vec2(127.1, 311.7));
  p += dot(p, p + 19.19);
  return fract(p.x * p.y);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  vec2 u = f*f*(3.-2.*f);
  float a = hash(i);
  float b = hash(i+vec2(1,0));
  float c = hash(i+vec2(0,1));
  float d = hash(i+vec2(1,1));
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}

float fbm(vec2 p, int oct) {
  float v=0., a=.5;
  for(int i=0;i<8;i++){
    if(i>=oct)break;
    v+=a*noise(p);
    p=p*2.+.3;
    a*=.5;
  }
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  uv.y = 1. - uv.y;

  vec2 p = uv * 2.8;
  float T = u_t * 0.00038;

  // Slow organic warp
  vec2 q = vec2(
    fbm(p + T * .7, 6),
    fbm(p + vec2(1.3, .9) + T * .5, 6)
  );
  vec2 r = vec2(
    fbm(p + 2.2*q + vec2(.4, T*.3), 6),
    fbm(p + 2.2*q + vec2(8.2, T*.4), 6)
  );
  float f = fbm(p + 2.8*r + T*.2, 7);

  // Aurora-like color bands (monochrome base + accent hints)
  float band1 = smoothstep(.0, .6, f + .15*sin(T*2.1 + uv.x*3.));
  float band2 = smoothstep(.3, .9, f + .12*cos(T*1.7 + uv.y*2.5));

  // Base: black → dark grey → near-white
  vec3 dark  = vec3(0.);
  vec3 mid   = vec3(.08,.08,.10);
  vec3 light = vec3(.96,.96,.98);

  vec3 col = mix(dark, mid, band1);
  col = mix(col, light, band2 * band2);

  // Subtle iridescent tint — barely perceptible
  float tint = f * .5 + .5*sin(T*3.+f*6.);
  vec3 hue1 = vec3(.68,.78,.92); // cold blue-silver
  vec3 hue2 = vec3(.88,.80,.96); // soft lavender
  vec3 hue3 = vec3(.76,.90,.82); // pale mint
  vec3 irid = mix(hue1, mix(hue2, hue3, sin(tint*PI)*.5+.5), cos(tint*PI*.7)*.5+.5);
  col = mix(col, col * irid, 0.22);

  // Radial vignette
  float d = length(uv - .5) * 1.6;
  float vig = 1. - smoothstep(.4, 1.15, d);
  col *= vig;

  // Luminance boost in center
  float lum = dot(col, vec3(.299,.587,.114));
  col = mix(col, col * 1.18, smoothstep(.3,.0,d));

  fragColor = vec4(col, 1.);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uT   = gl.getUniformLocation(prog, 'u_t');

let start = null;
function frame(ts) {
  if (!start) start = ts;
  const t = ts - start;
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uT, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
card.addEventListener('click', () => { start = null; });

}
</script>
